<app-search-bar (search)="onSearch($event)"></app-search-bar>

<!-- ✅ Estado de carga mejorado -->
<div *ngIf="isLoading()" class="p-4 flex justify-center items-center min-h-screen">
  <div class="text-lg text-secondary">Cargando menú...</div>
</div>

<!-- ✅ Menú renderizado con Signals -->
<div *ngIf="!isLoading()" class="p-4">
  <!-- Sin resultados -->
  <div *ngIf="menu().length === 0" class="text-center p-8">
    <p class="text-secondary text-lg">No se encontraron productos que coincidan con tu búsqueda.</p>
  </div>

  <!-- Categorías -->
  <div *ngFor="let cat of menu()" class="mb-4">
    <h2 class="text-2xl font-bold text-primary mb-3">
      {{ cat.name }}
    </h2>
    <h3 class="font-bold text-secondary mb-3">
      {{ cat.description }}
    </h3>

    <!-- Subcategorías (solo si tienen productos) -->
    <div *ngFor="let sub of cat.subcategories" class="mb-3">
      <!-- 🔧 Solo mostrar subcategoría si tiene productos -->
      <ng-container *ngIf="sub.products.length > 0">
        <h3 class="text-xl font-semibold text-secondary mb-2">
          {{ sub.name }}
        </h3>

        <!-- Grid de productos -->
        <div class="grid gap-8 sm:gap-10"
             style="grid-template-columns: repeat(auto-fit, minmax(130px,1fr));">

          <app-product-card
            *ngFor="let prod of sub.products"
            [product]="prod">
          </app-product-card>

        </div>
      </ng-container>
    </div>
  </div>

</div>
