<header class="w-full bg-primary shadow-lg">
  <div class="px-4 sm:px-8 py-4 flex items-center justify-between gap-4">
    
    <!-- LOGO + INFORMACIÓN (Izquierda) -->
    <a [routerLink]="['/menu']" class="flex items-center gap-2 sm:gap-4 flex-shrink-0 hover:opacity-80 transition-opacity cursor-pointer min-w-0">
      <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-white/20 flex items-center justify-center overflow-hidden shadow-md hover:shadow-lg transition-shadow flex-shrink-0">
        <img src="assets/img/logo.png" 
             alt="Coffee House - Logo"
             loading="lazy"
             class="w-full h-full object-cover"/>
      </div>

      <div class="min-w-0">
        <h1 class="text-base sm:text-lg font-bold tracking-wide text-white truncate" 
            style="font-family: 'Georgia', serif; margin: 0;">
          Coffee House
        </h1>
        <p class="hidden sm:block text-xs text-white/70 font-medium truncate" style="margin: 0;">Café artesanal • Est. 1998</p>
      </div>
    </a>

    <!-- 🔧 ESPACIADOR (empuja las acciones a la derecha) -->
    <div class="flex-1"></div>

    <!-- 🎮 ACCIONES (agrupadas por propósito) -->
    <div class="flex items-center gap-2 sm:gap-3">

      <!-- SELECTOR DE TEMAS (Desktop) -->
      <div class="hidden md:block relative">
        <button 
          id="theme-btn"
          class="p-2.5 rounded-lg hover:bg-white/10 transition-colors text-white" 
          (click)="toggleThemeSelector()"
          aria-haspopup="menu"
          [attr.aria-expanded]="isThemeSelectorOpen()"
          aria-label="Cambiar tema de color"
          title="Temas">
          <span class="material-icons text-xl sm:text-2xl" aria-hidden="true">palette</span>
        </button>

        <!-- Dropdown: Temas -->
        <div *ngIf="isThemeSelectorOpen()" 
             role="menu"
             aria-labelledby="theme-btn"
             class="absolute top-full right-0 mt-3 bg-surface border border-border rounded-xl shadow-2xl p-4 w-56 z-50">
          <p class="text-xs font-bold uppercase tracking-widest mb-3 text-text-secondary px-2">Seleccionar Tema</p>
          <button 
            *ngFor="let theme of availableThemes()" 
            type="button"
            role="menuitem"
            [attr.aria-selected]="currentThemeId() === theme.id"
            (click)="setTheme(theme.id)"
            [ngClass]="{
              'bg-primary text-tertiary font-semibold shadow-md': currentThemeId() === theme.id,
              'text-text bg-background-light hover:bg-hover': currentThemeId() !== theme.id
            }"
            class="w-full text-left px-3 py-3 rounded-lg mb-2 last:mb-0 transition-all duration-150 flex items-center gap-2.5">
            <span class="material-icons text-base" aria-hidden="true">{{ theme.id === 'classic' ? 'light_mode' : 'dark_mode' }}</span>
            <span class="font-medium">{{ theme.name }}</span>
          </button>
        </div>
      </div>

      <!-- CARRITO -->
      <button 
        *ngIf="isAuthReady() && !auth.isAdmin()"
        type="button"
        class="relative p-2.5 rounded-lg hover:bg-white/10 transition-colors text-white"
        (click)="cart.open()"
        aria-label="Abrir carrito de compras"
        title="Carrito">
        <span class="material-icons text-xl sm:text-2xl" aria-hidden="true">shopping_cart</span>
        
        <!-- Badge: Contador de artículos -->
        <span class="absolute -top-1 -right-1 bg-error text-white text-xs font-bold
                    w-5 h-5 flex items-center justify-center rounded-full shadow-lg"
              *ngIf="cartCount() > 0"
              [attr.aria-label]="'Artículos en el carrito: ' + (cartCount() || 0)">
          {{ cartCount() }}
        </span>
      </button>

      <!-- MENÚ HAMBURGUESA -->
      <button type="button" 
              class="p-2.5 rounded-lg hover:bg-white/10 transition-colors text-white"
              (click)="openMenu()"
              aria-label="Abrir menú"
              aria-haspopup="menu"
              title="Menú">
        <span class="material-icons text-xl sm:text-2xl" aria-hidden="true">menu</span>
      </button>
    </div>
  </div>

  <!-- MENÚ MÓVIL (DRAWER) -->
  <app-mobile-menu
    [isOpen]="isMenuOpen()"
    [isLoggedIn]="isAuthReady() && auth.isLoggedIn()"
    [isAdmin]="isAuthReady() && auth.isAdmin()"
    [cartCount]="cartCount()"
    [availableThemes]="availableThemes()"
    [currentThemeId]="currentThemeId()"
    (closed)="closeMenu()"
    (logout)="logout()"
    (themeChange)="setTheme($event)"
    (openCart)="cart.open()">
  </app-mobile-menu>
</header>
