<header class="w-full header-bar shadow-md px-3 sm:px-6 py-3 flex items-center justify-between gap-4">

  <!-- 🎯 LOGO + MARCA (Navegación primaria) -->
  <a [routerLink]="['/menu']" class="flex items-center gap-3 flex-shrink-0 hover:opacity-80 transition-opacity cursor-pointer">
    <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-secondary flex items-center justify-center overflow-hidden shadow-md hover:shadow-lg transition-shadow">
      <img src="assets/img/logo.png" 
           alt="Coffee House - Logo"
           loading="lazy"
           class="w-full h-full object-cover" 
           role="img"/>
    </div>

    <h1 class="text-lg sm:text-2xl font-bold tracking-wider hidden sm:block text-secondary" 
        style="font-family: 'Georgia', serif;">
      Coffee House
    </h1>
  </a>

  <!-- 🔧 ESPACIADOR (empuja las acciones a la derecha) -->
  <div class="flex-1"></div>

  <!-- 🎮 ACCIONES (agrupadas por propósito) -->
  <div class="flex items-center gap-2 sm:gap-3">

    <!-- ═══════════════════════════════════════ -->
    <!-- SOLO EN DESKTOP: SELECTOR DE TEMAS -->
    <!-- ═══════════════════════════════════════ -->
    <div class="hidden md:flex items-center gap-2">
      <!-- SELECTOR DE TEMAS (Configuración) -->
      <div class="relative">
        <button 
          id="theme-btn"
          class="p-2 rounded-lg hover:bg-secondary/20 transition-colors duration-200 text-secondary" 
          (click)="toggleThemeSelector()"
          aria-haspopup="menu"
          [attr.aria-expanded]="isThemeSelectorOpen()"
          aria-label="Cambiar tema de color"
          title="Temas">
          <span class="material-icons text-2xl" aria-hidden="true">palette</span>
        </button>

        <!-- Dropdown: Temas -->
        <div *ngIf="isThemeSelectorOpen()" 
             role="menu"
             aria-labelledby="theme-btn"
             class="absolute top-full right-0 mt-2 bg-surface border border-border rounded-xl shadow-2xl p-3 w-48 z-50 animate-in fade-in slide-in-from-top-2">
          <p class="text-xs font-bold uppercase tracking-wide mb-3 text-text-secondary px-1">Tema</p>
          <button 
            *ngFor="let theme of availableThemes()" 
            type="button"
            role="menuitem"
            [attr.aria-selected]="currentThemeId() === theme.id"
            (click)="setTheme(theme.id)"
            [ngClass]="{
              'bg-primary text-tertiary font-semibold shadow-md': currentThemeId() === theme.id,
              'text-text bg-background-light hover:bg-hover': currentThemeId() !== theme.id
            }"
            class="w-full text-left px-3 py-2.5 rounded-lg mb-2 last:mb-0 transition-all duration-150 flex items-center gap-2">
            <span class="material-icons text-base" aria-hidden="true">{{ theme.id === 'classic' ? 'light_mode' : 'dark_mode' }}</span>
            {{ theme.name }}
          </button>
        </div>
      </div>

      <!-- CARRITO (solo en desktop, para todos menos admin) -->
      <button 
        *ngIf="isAuthReady() && !auth.isAdmin()"
        type="button"
        class="relative p-2 rounded-lg hover:bg-secondary/20 transition-colors duration-200 text-secondary"
        (click)="cart.open()"
        aria-label="Abrir carrito de compras">
        <span class="material-icons text-2xl" aria-hidden="true">shopping_cart</span>
        
        <!-- Badge: Contador de artículos -->
        <span class="absolute -top-0.5 -right-0.5 bg-accent text-white text-xs font-bold
                    w-5 h-5 flex items-center justify-center rounded-full shadow-md"
              *ngIf="cartCount() > 0"
              [attr.aria-label]="'Artículos en el carrito: ' + (cartCount() || 0)">
          {{ cartCount() }}
        </span>
      </button>
    </div>

    <!-- ═══════════════════════════════════════ -->
    <!-- CARRITO EN MÓVIL (visible siempre) -->
    <!-- ═══════════════════════════════════════ -->
    <button 
      *ngIf="isAuthReady() && !auth.isAdmin()"
      type="button"
      class="relative p-2 rounded-lg hover:bg-secondary/20 transition-colors duration-200 md:hidden text-secondary"
      (click)="cart.open()"
      aria-label="Abrir carrito de compras">
      <span class="material-icons text-2xl" aria-hidden="true">shopping_cart</span>
      
      <!-- Badge: Contador de artículos -->
      <span class="absolute -top-0.5 -right-0.5 bg-accent text-white text-xs font-bold
                  w-5 h-5 flex items-center justify-center rounded-full shadow-md"
            *ngIf="cartCount() > 0"
            [attr.aria-label]="'Artículos en el carrito: ' + (cartCount() || 0)">
        {{ cartCount() }}
      </span>
    </button>

    <!-- ═══════════════════════════════════════ -->
    <!-- SEPARADOR VISUAL EN DESKTOP -->
    <!-- ═══════════════════════════════════════ -->
    <div class="hidden md:block w-px h-6 bg-border/30"></div>

    <!-- 3️⃣ NAVEGACIÓN DESKTOP (Admin + Perfil/Logout) -->
    <div class="hidden md:flex items-center gap-1">

      <!-- 3a. BOTÓN ADMINISTRAR (para todos los usuarios) -->
      <!-- Si NO está logueado → va a login -->
      <!-- Si está logueado y es admin → va a admin -->
      <!-- Si está logueado pero NO es admin → no se muestra -->
      <a *ngIf="isAuthReady() && (!auth.isLoggedIn())" 
         [routerLink]="['/auth/login']"
         class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-secondary font-medium 
                hover:bg-secondary/15 transition-colors duration-200"
         title="Inicia sesión para acceder al panel de administración"
         aria-label="Administración (requiere login)">
        <span class="material-icons text-xl" aria-hidden="true">admin_panel_settings</span>
        <span class="hidden lg:inline text-sm">Administrar</span>
      </a>

      <!-- 3b. BOTÓN ADMIN (solo si es admin y auth está listo) -->
      <a *ngIf="isAuthReady() && auth.isLoggedIn() && auth.isAdmin()" 
         [routerLink]="['/admin']"
         class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-secondary font-medium 
                hover:bg-secondary/15 transition-colors duration-200"
         aria-label="Ir al panel de administración">
        <span class="material-icons text-xl" aria-hidden="true">admin_panel_settings</span>
        <span class="hidden lg:inline text-sm">Admin</span>
      </a>

      <!-- 3c. MENÚ USUARIO (Perfil + Logout) - solo si está autenticado y auth está listo -->
      <ng-container *ngIf="isAuthReady() && auth.isLoggedIn()">
        <div class="relative">
          <button type="button" 
                  class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-secondary/10 text-secondary 
                         font-medium hover:bg-secondary/20 transition-colors duration-200 group"
                  (click)="toggleUserMenu()"
                  [attr.aria-expanded]="isUserMenuOpen()"
                  aria-haspopup="menu"
                  aria-label="Menú de usuario">
            <span class="material-icons text-xl" aria-hidden="true">account_circle</span>
            <span class="max-w-[120px] truncate text-sm">
              {{ auth.currentUser()?.full_name ?? 'Mi cuenta' }}
            </span>
            <span class="material-icons text-lg transition-transform duration-200" 
                  [class.rotate-180]="isUserMenuOpen()"
                  aria-hidden="true">
              expand_more
            </span>
          </button>

          <!-- Dropdown: Usuario -->
          <div *ngIf="isUserMenuOpen()" 
               role="menu"
               class="absolute top-full right-0 mt-2 bg-surface border border-border rounded-xl shadow-2xl p-2 w-48 z-50 animate-in fade-in slide-in-from-top-2">
            
            <!-- Info del usuario -->
            <div class="px-3 py-2 border-b border-border mb-2">
              <p class="text-xs text-text-secondary font-medium">CUENTA</p>
              <p class="text-sm font-semibold text-text mt-1 truncate">
                {{ auth.currentUser()?.email }}
              </p>
              <p class="text-xs text-text-secondary mt-1">
                {{ auth.currentUser()?.role === 'admin' ? '👨‍💼 Administrador' : '👤 Cliente' }}
              </p>
            </div>

            <!-- Acción: Logout -->
            <button type="button" 
                    role="menuitem"
                    class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-error hover:bg-error/10
                           transition-colors duration-200 font-medium text-sm"
                    (click)="logout()"
                    aria-label="Cerrar sesión">
              <span class="material-icons text-xl" aria-hidden="true">logout</span>
              Cerrar sesión
            </button>
          </div>
        </div>
      </ng-container>
    </div>

    <!-- 4️⃣ MENÚ HAMBURGUESA MÓVIL (siempre visible en móvil) -->
    <button type="button" 
            class="p-2 rounded-lg hover:bg-secondary/20 transition-colors duration-200 md:hidden text-secondary"
            (click)="openMenu()"
            aria-label="Abrir menú"
            aria-haspopup="menu">
      <span class="material-icons text-2xl" aria-hidden="true">menu</span>
    </button>
  </div>

</header>

<!-- MENÚ MÓVIL (DRAWER) -->
<app-mobile-menu
  [isOpen]="isMenuOpen()"
  [isLoggedIn]="isAuthReady() && auth.isLoggedIn()"
  [isAdmin]="isAuthReady() && auth.isAdmin()"
  [cartCount]="cartCount()"
  [availableThemes]="availableThemes()"
  [currentThemeId]="currentThemeId()"
  (closed)="closeMenu()"
  (logout)="logout()"
  (themeChange)="setTheme($event)"
  (openCart)="cart.open()">
</app-mobile-menu>
