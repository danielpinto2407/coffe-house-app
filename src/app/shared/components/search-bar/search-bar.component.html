<!-- 📱 VERSIÓN MÓVIL: Buscador compacto siempre visible -->
<div class="md:hidden w-full px-3 py-1" style="background: var(--color-surface);">
  <input
    type="text"
    [(ngModel)]="term"
    (input)="onInput()"
    placeholder="Buscar..."
    class="search-input w-full px-3 py-1.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition text-xs"
  />
</div>

<!-- 💻 VERSIÓN DESKTOP: Barra siempre visible -->
<div class="hidden md:block px-4 pt-0 pb-2">
  <input
    type="text"
    [(ngModel)]="term"
    (input)="onInput()"
    placeholder="Buscar productos..."
        class="search-input w-full px-4 py-2 rounded-xl
          focus:outline-none focus:ring-2 focus:ring-primary transition text-sm"
  />
</div>
