<!-- BACKDROP -->
<div 
  *ngIf="cart.open$ | async"
  class="fixed inset-0 backdrop-blur-sm z-40"
  [style.backgroundColor]="'rgba(0, 0, 0, 0.5)'"
  (click)="cart.close()"
  (keydown)="$event.key === 'Escape' && cart.close()"
  role="presentation"
  tabindex="-1"
  aria-hidden="true">
</div>

<!-- OVERLAY PANEL -->
<div 
  *ngIf="cart.open$ | async"
    class="fixed right-0 top-0 h-full w-80 shadow-2xl z-50 p-5
      flex flex-col transition-transform transform border-l text-white"
    [style.backgroundColor]="'var(--color-background)'"
  [style.borderLeftColor]="'var(--color-secondary)'"
  [class.translate-x-full]="!(cart.open$ | async)"
  [class.translate-x-0]="cart.open$ | async"
  role="dialog"
  aria-label="Carrito de compras"
  aria-modal="true">

  <!-- Header -->
  <div class="flex justify-between items-center mb-5">
    <h2 class="text-xl font-bold text-white">Tu carrito</h2>
    <button 
      type="button"
      class="text-white/70 hover:text-white transition"
      (click)="cart.close()"
      aria-label="Cerrar carrito">
      ✕
    </button>
  </div>

  <!-- Items -->
  <div class="cart-items-scroll flex-1 pr-2 space-y-4">

    <div *ngFor="let item of (cart.items$ | async)" class="flex gap-3">

      <!-- Imagen -->
      <img 
        [src]="resolveProductImage(item.product.image)" 
        [alt]="item.product.name"
        loading="lazy"
        (error)="onCartImageError($event)"
        class="w-16 h-16 rounded-lg object-cover shadow">

      <!-- Info -->
      <div class="flex-1">
        <p class="font-semibold text-white">{{ item.product.name }}</p>
        
        <!-- Precio base o final -->
        <p class="text-sm text-white/70">
          <span *ngIf="!item.finalPrice">$ {{ item.product.price | number }}</span>
          <span *ngIf="item.finalPrice">$ {{ item.finalPrice | number }}</span>
        </p>

        <!-- Adiciones si existen -->
        <div *ngIf="item.selectedAdditions && item.selectedAdditions.length > 0" class="mt-1">
          <p class="text-xs text-white/50 mb-1">Adiciones:</p>
          <div class="flex flex-wrap gap-1">
            <span 
              *ngFor="let addition of item.selectedAdditions"
              class="text-xs bg-white/10 px-2 py-1 rounded"
              [title]="addition.name + ' +$' + addition.price">
              {{ addition.name }}
            </span>
          </div>
        </div>

        <!-- Controles -->
        <div class="flex items-center gap-2 mt-2">

          <button 
            type="button"
            [style.backgroundColor]="'var(--color-tertiary)'"
            [style.color]="'var(--color-text)'"
            class="px-2 py-1 rounded hover:opacity-80 transition"
            (click)="onDecrease(item.product.id)"
            [attr.aria-label]="'Disminuir cantidad de ' + item.product.name">
            -
          </button>

          <span class="font-semibold text-white" [attr.aria-label]="'Cantidad: ' + item.qty">{{ item.qty }}</span>

          <button 
            type="button"
            [style.backgroundColor]="'var(--color-tertiary)'"
            [style.color]="'var(--color-text)'"
            class="px-2 py-1 rounded hover:opacity-80 transition"
            (click)="onIncrease(item.product.id)"
            [attr.aria-label]="'Aumentar cantidad de ' + item.product.name">
            +
          </button>

        </div>
      </div>

      <!-- Eliminar -->
      <button 
        type="button"
        class="text-white/60 hover:text-white font-bold transition"
        (click)="onRemove(item.product.id)"
        [attr.aria-label]="'Eliminar ' + item.product.name + ' del carrito'">
        ✕
      </button>

    </div>

  </div>

  <!-- Footer -->
  <div [style.borderTopColor]="'rgba(255,255,255,0.2)'" class="border-t pt-4 mt-4">

    <div class="flex justify-between font-semibold mb-3 text-white">
      <span>Subtotal</span>
      <span>$ {{ (cart.total$ | async) || 0 | number }}</span>
    </div>

    <!-- Campos de nombre y observación -->
    <div class="flex flex-col gap-3 mb-4">
      <label class="text-sm font-medium text-text" for="customerName">Nombre <span class="text-red-500">*</span></label>
      <input
        id="customerName"
        type="text"
        class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary text-text bg-background"
        [(ngModel)]="customerName"
        [class.border-red-500]="nameTouched && !customerName.trim()"
        (blur)="nameTouched = true"
        maxlength="40"
        autocomplete="off"
        required
      />
      <div *ngIf="nameTouched && !customerName.trim()" class="text-xs text-red-500">El nombre es obligatorio</div>

      <label class="text-sm font-medium text-text" for="observation">Observación (opcional)</label>
      <textarea
        id="observation"
        class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary text-text bg-background"
        [(ngModel)]="observation"
        maxlength="120"
        rows="2"
      ></textarea>
    </div>

    <button 
      type="button"
      class="w-full bg-secondary text-text py-3 rounded-xl font-semibold 
                   hover:bg-secondary/90 transition"
      (click)="onCheckout()"
      [disabled]="!customerName.trim()"
      aria-label="Proceder al pago">
      Proceder al pago
    </button>

  </div>

</div>
