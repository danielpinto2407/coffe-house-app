<header class="w-full header-bar shadow-lg px-4 py-3 flex items-center justify-between">

  <!-- LOGO -->
  <div class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition">
    <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-secondary flex items-center justify-center overflow-hidden shadow-md">
      <img src="assets/img/logo.png" 
           alt="Coffee House - Logo del sitio"
           loading="lazy"
           class="w-full h-full object-cover" 
           [title]="'Coffee House'"/>
    </div>

    <h1 class="text-2xl font-bold tracking-wider hidden sm:block text-secondary" 
        style="font-family: 'Georgia', serif;">
      Coffee House
    </h1>
  </div>

  <!-- ACCIONES -->
  <div class="flex items-center gap-3">

    <!-- SELECTOR DE TEMAS -->
    <div class="relative">
      <button 
        id="theme-btn"
        class="p-2 rounded-full hover:bg-secondary/30 transition" 
        (click)="toggleThemeSelector()"
        aria-haspopup="menu"
        [attr.aria-expanded]="isThemeSelectorOpen()"
        aria-label="Selector de temas"
        title="Cambiar tema">
        <span class="material-icons text-secondary text-2xl" aria-hidden="true">palette</span>
      </button>

      <!-- DROPDOWN DE TEMAS -->
      <div *ngIf="isThemeSelectorOpen()" 
           role="menu"
           aria-labelledby="theme-btn"
           class="absolute top-full right-0 mt-2 bg-surface border border-border rounded-lg shadow-xl p-3 w-48 z-50">
        <p class="text-sm font-semibold mb-2 text-text">Seleccionar tema:</p>
        <button 
          *ngFor="let theme of availableThemes()" 
          type="button"
          role="menuitem"
          [attr.aria-selected]="currentThemeId() === theme.id"
          (click)="setTheme(theme.id)"
          [ngClass]="{
            'bg-primary text-white font-bold': currentThemeId() === theme.id,
            'text-text bg-background-light': currentThemeId() !== theme.id
          }"
          class="w-full text-left px-3 py-2 rounded-lg mb-1 transition duration-200 hover:bg-hover">
          {{ theme.name }}
        </button>
      </div>
    </div>

    <!-- CARRITO (solo visble cuando hay sesión activa) -->
    <button 
      *ngIf="auth.isLoggedIn()"
      type="button"
      class="relative p-2 rounded-full hover:bg-secondary/30 transition"
      (click)="cart.open()"
      aria-label="Carrito de compras">

      <span class="material-icons text-secondary text-3xl" aria-hidden="true">shopping_cart</span>

      <span class="absolute -top-1 -right-1 bg-accent text-white text-xs font-bold
                  w-5 h-5 flex items-center justify-center rounded-full"
            [attr.aria-label]="'Artículos en el carrito: ' + (cartCount() || 0)">
        {{ cartCount() || 0 }}
      </span>
    </button>

    <!-- BOTONES DESKTOP -->
    <div class="hidden md:flex items-center gap-2">

      <!-- SÍ autenticado -->
      <ng-container *ngIf="auth.isLoggedIn()">
        <a *ngIf="auth.isAdmin()" [routerLink]="['/admin']"
           class="flex items-center gap-1 px-3 py-1 rounded-lg text-secondary font-medium hover:bg-secondary/20 transition duration-200">
          <span class="material-icons text-base" aria-hidden="true">admin_panel_settings</span>
          Admin
        </a>
        <button type="button" class="flex items-center gap-2 bg-secondary text-primary px-3 py-1 rounded-lg font-medium hover:bg-accent hover:shadow-lg transition duration-200">
          <span class="material-icons text-white" aria-hidden="true">account_circle</span>
          {{ auth.currentUser()?.full_name ?? 'Mi cuenta' }}
        </button>
        <button type="button" class="p-2 rounded-full hover:bg-white/20 hover:scale-110 transition duration-200" 
                (click)="logout()"
                aria-label="Cerrar sesión">
          <span class="material-icons text-secondary text-2xl" aria-hidden="true">logout</span>
        </button>
      </ng-container>

    </div>

    <!-- MENÚ HAMBURGUESA SOLO EN MÓVIL -->
    <button type="button" 
            class="p-2 rounded-full hover:bg-secondary/30 transition md:hidden"
            (click)="openMenu()"
            aria-label="Abrir menú de navegación">
      <span class="material-icons text-secondary text-3xl" aria-hidden="true">menu</span>
    </button>

  </div>

</header>

<!-- MENÚ MÓVIL (DRAWER) -->
<app-mobile-menu
  [isOpen]="isMenuOpen()"
  [isLoggedIn]="auth.isLoggedIn()"
  [isAdmin]="auth.isAdmin()"
  (closed)="closeMenu()"
  (logout)="logout()">
</app-mobile-menu>
