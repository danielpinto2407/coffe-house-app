<!-- BACKDROP -->
<div 
  *ngIf="cart.open$ | async"
  class="fixed inset-0 bg-black/75 backdrop-blur-sm z-40"
  (click)="cart.close()"
  (keydown)="$event.key === 'Escape' && cart.close()"
  role="presentation"
  tabindex="-1"
  aria-hidden="true">
</div>

<!-- OVERLAY PANEL -->
<div 
  *ngIf="cart.open$ | async"
  [style.backgroundColor]="'var(--color-background)'"
  [style.borderLeftColor]="'var(--color-border)'"
  class="fixed right-0 top-0 h-full w-80 shadow-2xl z-50 p-5
         flex flex-col transition-transform transform border-l"
  [class.translate-x-full]="!(cart.open$ | async)"
  [class.translate-x-0]="cart.open$ | async"
  role="dialog"
  aria-label="Carrito de compras"
  aria-modal="true">

  <!-- Header -->
  <div class="flex justify-between items-center mb-5">
    <h2 class="text-xl font-bold text-text">Tu carrito</h2>
    <button 
      type="button"
      class="text-text-secondary hover:text-text transition"
      (click)="cart.close()"
      aria-label="Cerrar carrito">
      ✕
    </button>
  </div>

  <!-- Items -->
  <div class="overflow-y-auto flex-1 pr-2 space-y-4">

    <div *ngFor="let item of (cart.items$ | async)" class="flex gap-3">

      <!-- Imagen -->
      <img 
        [src]="item.product.image" 
        [alt]="item.product.name"
        loading="lazy"
        class="w-16 h-16 rounded-lg object-cover shadow">

      <!-- Info -->
      <div class="flex-1">
        <p class="font-semibold text-text">{{ item.product.name }}</p>
        <p class="text-sm text-text-secondary">$ {{ item.product.price | number }}</p>

        <!-- Controles -->
        <div class="flex items-center gap-2 mt-2">

          <button 
            type="button"
            [style.backgroundColor]="'var(--color-tertiary)'"
            [style.color]="'var(--color-text)'"
            class="px-2 py-1 rounded hover:opacity-80 transition"
            (click)="onDecrease(item.product.id)"
            [attr.aria-label]="'Disminuir cantidad de ' + item.product.name">
            -
          </button>

          <span class="font-semibold text-text" [attr.aria-label]="'Cantidad: ' + item.qty">{{ item.qty }}</span>

          <button 
            type="button"
            [style.backgroundColor]="'var(--color-tertiary)'"
            [style.color]="'var(--color-text)'"
            class="px-2 py-1 rounded hover:opacity-80 transition"
            (click)="onIncrease(item.product.id)"
            [attr.aria-label]="'Aumentar cantidad de ' + item.product.name">
            +
          </button>

        </div>
      </div>

      <!-- Eliminar -->
      <button 
        type="button"
        class="text-error hover:opacity-80 font-bold transition"
        (click)="onRemove(item.product.id)"
        [attr.aria-label]="'Eliminar ' + item.product.name + ' del carrito'">
        ✕
      </button>

    </div>

  </div>

  <!-- Footer -->
  <div [style.borderTopColor]="'var(--color-border)'" class="border-t pt-4 mt-4">

    <div class="flex justify-between font-semibold mb-3 text-text">
      <span>Subtotal</span>
      <span>$ {{ (cart.total$ | async) || 0 | number }}</span>
    </div>

    <button 
      type="button"
      class="w-full bg-primary text-white py-3 rounded-xl font-semibold 
                   hover:bg-primary/90 transition"
      (click)="onCheckout()"
      aria-label="Proceder al pago">
      Proceder al pago
    </button>

  </div>

</div>
