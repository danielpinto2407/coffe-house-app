<!-- Backdrop -->
<div 
  *ngIf="modal.product$ | async as product"
  class="backdrop fixed inset-0 backdrop-blur-sm z-40"
  [style.backgroundColor]="'rgba(0, 0, 0, 0.5)'"
  (click)="modal.close()"
  (keydown.escape)="modal.close()"
  role="presentation"
  tabindex="-1">
</div>

<!-- Modal -->
<div 
  *ngIf="modal.product$ | async as product"
  class="fixed inset-0 flex items-center justify-center z-50 p-4"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="'Detalles de ' + product.name">

  <div 
    class="modal-content rounded-2xl shadow-2xl w-full max-w-md 
           transform transition-all duration-300"
    [style.backgroundColor]="'var(--color-surface)'"
    (click)="$event.stopPropagation()">

    <div class="p-5 overflow-hidden">
      <!-- Imagen del producto -->
      <img 
        [src]="product.image" 
        [alt]="product.name"
        loading="lazy"
        class="product-image w-full rounded-xl mb-4 shadow-md"
      >

      <!-- Información del producto -->
      <div class="space-y-3">
        <h2 class="text-2xl font-bold text-text">
          {{ product.name }}
        </h2>

        <p class="text-text-secondary text-sm leading-relaxed">
          {{ product.description }}
        </p>

        <p class="text-xl font-bold text-primary">
          $ {{ product.price | number:'1.0-0' }}
        </p>
      </div>

      <!-- Botones de acción -->
      <div class="button-container mt-6">
        <button
          type="button"
          class="flex-1 bg-primary text-white py-3 rounded-xl font-semibold
                hover:bg-primary/90 hover:shadow-lg active:scale-95
                transition-all duration-200"
          (click)="onAddToCart(product)"
          [attr.aria-label]="'Agregar ' + product.name + ' al carrito'">
          Agregar al carrito
        </button>

        <button 
          type="button"
          class="button-close bg-background-light hover:bg-hover text-text 
                font-semibold py-3 rounded-xl transition-all duration-200 
                active:scale-95"
          (click)="modal.close()"
          (keydown.enter)="modal.close()"
          title="Cerrar modal (ESC)"
          aria-label="Cerrar">
          ✕
        </button>
      </div>
    </div>
  </div>
</div>
